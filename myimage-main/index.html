<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title></title>
    <link id="dynamic-favicon" rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="files/main.css">
</head>
<body>

<div id="mobile-overlay" onclick="document.getElementById('public-nav-categories').classList.remove('show'); this.classList.remove('show');"></div>

<header class="site-header" >
    <div class="header-container" >
            <div class="mobile-btn mobile-menu-toggle" onclick="document.getElementById('public-nav-categories').classList.add('show'); document.getElementById('mobile-overlay').classList.add('show'); document.querySelector('.header-right').classList.remove('show');"><i class="fas fa-bars"></i></div>
            <div class="header-left" style="display: flex; align-items: center;">
                <div class="logo-area" style="display: flex; align-items: center; margin-right: 30px;">
                    <img id="site-logo" src="" style="display: none; height: 47px; width: auto; margin-right: 0px;">
                    <a href="/" id="site-name" class="blog-name" style="font-size: 20px; font-weight: bold; color: #333; text-decoration: none; display: none;"></a>
                </div>
                <nav id="public-nav-categories" style="display: flex; font-size: 14px;"></nav>
            </div>
        <div class="mobile-btn mobile-search-toggle" onclick="document.querySelector('.header-right').classList.toggle('show'); document.getElementById('public-nav-categories').classList.remove('show');"><i class="fas fa-search"></i></div>
        <div class="header-right" style="display: flex; align-items: center;">
            <div style="display: flex; border: 1px solid #ddd; border-radius: 20px; overflow: hidden; background: #fff;">
                <input type="text" id="public-search-input" placeholder="搜索图片标题..." 
                       style="padding: 6px 12px; border: none; outline: none; font-size: 14px; width: 150px; height: 32px; box-sizing: border-box;">
                <button onclick="filterImages()" 
                        style="padding: 0 15px; background: #409EFF; color: #fff; border: none; cursor: pointer; font-size: 14px; height: 32px; box-sizing: border-box; display: flex; align-items: center;">
                    搜索
                </button>
            </div>
        </div>
</header>

<div class="container">
    <div id="category-breadcrumb" style="margin-bottom: 20px; color: #333; font-size: 14px; display: none;"></div>
    <div class="masonry" id="public-gallery">
        <p style="text-align: center; width: 100%; color: #999;">正在加载图库...</p>
    </div>
</div>
<div id="pagination" class="pagination" style="display: none;"></div>
<div class="footer">
    <div id="footer-part1"></div>
    <div id="footer-part2"></div>
</div>

<script src="files/main.js"></script>
</body>
</html>
